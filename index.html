<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Variant Factory</title>
    <style>
        :root {
            --primary-color: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 24px;
        }

        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .control-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            height: fit-content;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 12px 20px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-download-all {
            background-color: #16a34a;
        }
        .btn-download-all:hover {
            background-color: #15803d;
        }

        .preview-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .grid-outputs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .variant-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            text-align: center;
            padding: 12px;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
        }

        .variant-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 4px;
        }

        .variant-card p {
            margin: 8px 0 4px 0;
            font-size: 12px;
            font-weight: bold;
        }

        .variant-card span {
            font-size: 12px;
            color: #16a34a;
            display: block;
            font-weight: 500;
        }

        #canvasStorage {
            display: none;
        }

        .status-message {
            margin-top: 10px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Product Variant Engine</h1>
        <p>Generates 10 uniquely modified, high-res 1000x1000px product files</p>
    </header>

    <div class="main-layout">
        <div class="control-panel">
            <div class="form-group">
                <label for="imageLoader">1. Upload Master Product Image</label>
                <input type="file" id="imageLoader" accept="image/*">
            </div>

            <div class="form-group">
                <label for="productTitle">2. Overlay Descriptor Text (Optional)</label>
                <input type="text" id="productTitle" placeholder="e.g., BRAND NEW" value="PREMIUM QUALITY">
            </div>

            <button id="generateBtn" class="btn" disabled>Generate 10 Unique Images</button>
            <button id="downloadAllBtn" class="btn btn-download-all" style="display: none;">Download All Images (ZIP)</button>
            <div id="statusUpdate" class="status-message"></div>
        </div>

        <div class="preview-panel">
            <h3>Rendered Target Variations</h3>
            <div id="gridOutputs" class="grid-outputs">
                <p style="color: #94a3b8; grid-column: 1/-1; text-align: center; padding: 40px 0;">
                    Please upload an image file to begin compilation processes.
                </p>
            </div>
        </div>
    </div>
</div>

<canvas id="canvasStorage" width="1000" height="1000"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const generateBtn = document.getElementById('generateBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const productTitleInput = document.getElementById('productTitle');
    const gridOutputs = document.getElementById('gridOutputs');
    const canvas = document.getElementById('canvasStorage');
    const statusUpdate = document.getElementById('statusUpdate');
    const ctx = canvas.getContext('2d');

    let uploadedImage = null;
    let generatedImagesBlobs = []; 

    imageLoader.addEventListener('change', function(e) {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            uploadedImage = new Image();
            uploadedImage.onload = function() {
                generateBtn.disabled = false;
                statusUpdate.innerText = "Image loaded successfully. Ready to process.";
            }
            uploadedImage.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    // Encapsulates logic modifying distinct digital structures at the pixel table layer
    function applyByteLevelNoise(context, width, height, structuralSeed) {
        const imgData = context.getImageData(0, 0, width, height);
        const data = imgData.data;
        
        // Modulates invisible deviations across the coordinate stream arrays
        for (let i = 0; i < data.length; i += 4) {
            // Apply micro shifts to Red, Green, and Blue segments independently
            const noise = (Math.sin(i * structuralSeed) * 1.5); 
            data[i]     = Math.min(255, Math.max(0, data[i] + noise));     // R
            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise)); // G
            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise)); // B
        }
        context.putImageData(imgData, 0, 0);
    }

    generateBtn.addEventListener('click', async function() {
        if (!uploadedImage) return;

        generateBtn.disabled = true;
        statusUpdate.innerText = "Processing variant matrices...";
        gridOutputs.innerHTML = '';
        generatedImagesBlobs = [];
        
        const titleText = productTitleInput.value.trim().toUpperCase();

        // 10 distinct, calculated layout modification factors
        const operationalMatrix = [
            { bg: "#FFFFFF", scale: 0.76, dx: 1,  dy: -30, fontCol: "#0f172a", quality: 0.92, seed: 0.11 },
            { bg: "#FFFFFE", scale: 0.74, dx: -3, dy: -28, fontCol:  "#1e293b", quality: 0.89, seed: 0.23 },
            { bg: "#FEFEFE", scale: 0.77, dx: 2,  dy: -32, fontCol:  "#334155", quality: 0.91, seed: 0.35 },
            { bg: "#FFFFFF", scale: 0.75, dx: -1, dy: -29, fontCol:  "#0284c7", quality: 0.87, seed: 0.47 },
            { bg: "#FFFFFD", scale: 0.76, dx: 3,  dy: -34, fontCol:  "#0f766e", quality: 0.93, seed: 0.59 },
            { bg: "#FDFDFD", scale: 0.73, dx: -2, dy: -27, fontCol:  "#b91c1c", quality: 0.86, seed: 0.71 },
            { bg: "#FEFEFF", scale: 0.78, dx: 0,  dy: -31, fontCol:  "#4338ca", quality: 0.90, seed: 0.83 },
            { bg: "#FFFFFC", scale: 0.74, dx: 2,  dy: -33, fontCol:  "#6d28d9", quality: 0.88, seed: 0.95 },
            { bg: "#FCFCFC", scale: 0.76, dx: -3, dy: -35, fontCol:  "#a21caf", quality: 0.94, seed: 1.07 },
            { bg: "#FFFFFF", scale: 0.75, dx: 1,  dy: -26, fontCol:  "#0369a1", quality: 0.85, seed: 1.19 }
        ];

        for (let i = 0; i < operationalMatrix.length; i++) {
            const config = operationalMatrix[i];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 1. Render micro-color background space
            ctx.fillStyle = config.bg;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();

            // 2. Structural offset translation transformations
            ctx.translate(canvas.width / 2 + config.dx, canvas.height / 2 + config.dy);

            const baseRatio = Math.min(canvas.width / uploadedImage.width, canvas.height / uploadedImage.height);
            const renderWidth = uploadedImage.width * baseRatio * config.scale;
            const renderHeight = uploadedImage.height * baseRatio * config.scale;

            // Draw product layer
            ctx.drawImage(uploadedImage, -renderWidth / 2, -renderHeight / 2, renderWidth, renderHeight);
            ctx.restore();

            // 3. Optional visual title descriptors
            if (titleText.length > 0) {
                ctx.save();
                ctx.fillStyle = config.fontCol;
                ctx.font = "bold 32px system-ui, Arial, sans-serif";
                ctx.textBaseline = "bottom";
                ctx.textAlign = "center";
                ctx.fillText(titleText, canvas.width / 2, canvas.height - 60);
                ctx.restore();
            }

            // 4. Run native array image modification logic (unique hash generation asset factor)
            applyByteLevelNoise(ctx, canvas.width, canvas.height, config.seed);

            // 5. Build localized variant blob using distinct target JPEG quality variables
            await new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    const fileSizeInKB = (blob.size / 1024).toFixed(1);
                    const filename = `Product_Variant_${i + 1}.jpg`;
                    
                    generatedImagesBlobs.push({ blob: blob, filename: filename });

                    const imageUrl = URL.createObjectURL(blob);
                    
                    // Display elements dynamically
                    const card = document.createElement('div');
                    card.className = 'variant-card';
                    
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    
                    const label = document.createElement('p');
                    label.innerText = `Variant Layout ${i + 1}`;
                    
                    const sizeLabel = document.createElement('span');
                    sizeLabel.innerText = `${fileSizeInKB} KB`;

                    card.appendChild(img);
                    card.appendChild(label);
                    card.appendChild(sizeLabel);
                    gridOutputs.appendChild(card);
                    
                    resolve();
                }, 'image/jpeg', config.quality);
            });
        }

        generateBtn.disabled = false;
        downloadAllBtn.style.display = 'block';
        statusUpdate.innerText = "Successfully constructed 10 unique asset files.";
    });

    downloadAllBtn.addEventListener('click', function() {
        if (generatedImagesBlobs.length === 0) return;

        const zip = new JSZip();
        generatedImagesBlobs.forEach(item => {
            zip.file(item.filename, item.blob);
        });

        zip.generateAsync({type:"blob"}).then(function(content) {
            const zipUrl = URL.createObjectURL(content);
            const downloadLink = document.createElement('a');
            downloadLink.href = zipUrl;
            downloadLink.download = "product_variants_package.zip";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        });
    });
</script>
</body>
</html>
