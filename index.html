<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Product Photoshoot Variant Engine</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --primary-hover: #1e293b;
            --accent-color: #3b82f6;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 2.2rem;
            letter-spacing: -0.05em;
        }

        header p {
            color: #64748b;
            margin: 0;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .control-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.05);
            height: fit-content;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-download-all {
            background-color: #10b981;
        }
        .btn-download-all:hover {
            background-color: #059669;
        }

        .preview-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }

        .preview-panel h3 {
            margin-top: 0;
            font-size: 1.3rem;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .grid-outputs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .variant-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
            text-align: center;
            padding: 12px;
            box-shadow: 0 2px 5px rgb(0 0 0 / 0.02);
            transition: transform 0.2s ease;
        }

        .variant-card:hover {
            transform: translateY(-2px);
        }

        .variant-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px solid #f1f5f9;
        }

        .variant-card p {
            margin: 10px 0 4px 0;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
        }

        .variant-card span {
            font-size: 12px;
            color: #10b981;
            display: block;
            font-weight: 600;
        }

        #canvasStorage {
            display: none;
        }

        .status-message {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Product Photoshoot Engine</h1>
        <p>Generates 10 distinct professional studio scenes at 1000x1000px</p>
    </header>

    <div class="main-layout">
        <div class="control-panel">
            <div class="form-group">
                <label for="imageLoader">1. Upload Master Product Image</label>
                <input type="file" id="imageLoader" accept="image/*">
            </div>

            <div class="form-group">
                <label for="productTitle">2. Overlay Descriptor Text</label>
                <input type="text" id="productTitle" placeholder="e.g., COUTURE SNEAKERS" value="PREMIUM QUALITY">
            </div>

            <button id="generateBtn" class="btn" disabled>Generate 10 Photoshoots</button>
            <button id="downloadAllBtn" class="btn btn-download-all" style="display: none;">Download All Images (ZIP)</button>
            <div id="statusUpdate" class="status-message"></div>
        </div>

        <div class="preview-panel">
            <h3>Rendered Studio Photoshoots</h3>
            <div id="gridOutputs" class="grid-outputs">
                <p style="color: #94a3b8; grid-column: 1/-1; text-align: center; padding: 60px 0;">
                    Please upload an image file to trigger the render engine pipelines.
                </p>
            </div>
        </div>
    </div>
</div>

<canvas id="canvasStorage" width="1000" height="1000"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const generateBtn = document.getElementById('generateBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const productTitleInput = document.getElementById('productTitle');
    const gridOutputs = document.getElementById('gridOutputs');
    const canvas = document.getElementById('canvasStorage');
    const statusUpdate = document.getElementById('statusUpdate');
    const ctx = canvas.getContext('2d');

    let uploadedImage = null;
    let generatedImagesBlobs = []; 

    imageLoader.addEventListener('change', function(e) {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            uploadedImage = new Image();
            uploadedImage.onload = function() {
                generateBtn.disabled = false;
                statusUpdate.innerText = "Master image loaded. Ready to simulate environments.";
            }
            uploadedImage.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    // Invisible micro-pixel deviations to guarantee unique file structural hashes
    function applyByteLevelNoise(context, width, height, structuralSeed) {
        const imgData = context.getImageData(0, 0, width, height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const noise = (Math.sin(i * structuralSeed) * 1.5); 
            data[i]     = Math.min(255, Math.max(0, data[i] + noise));     // R
            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise)); // G
            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise)); // B
        }
        context.putImageData(imgData, 0, 0);
    }

    generateBtn.addEventListener('click', async function() {
        if (!uploadedImage) return;

        generateBtn.disabled = true;
        statusUpdate.innerText = "Simulating photoshoot environments...";
        gridOutputs.innerHTML = '';
        generatedImagesBlobs = [];
        
        const titleText = productTitleInput.value.trim().toUpperCase();

        // High-end Photoshoot setup profiles running inside the canvas compositor
        const shoots = [
            {
                name: "Classic Studio White",
                render: (ctx, img, text) => {
                    // Crisp white back-gradient
                    let grad = ctx.createRadialGradient(500, 500, 50, 500, 500, 700);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(1, '#f1f5f9');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Smooth Floor Drop-shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
                    ctx.beginPath();
                    ctx.ellipse(500, 720, 220, 35, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // Render central product
                    ctx.drawImage(img, 220, 180, 560, 560);

                    // Minimal bottom typography
                    if(text) {
                        ctx.fillStyle = "#1e293b";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "4px";
                        ctx.fillText(text, 500, 900);
                    }
                }
            },
            {
                name: "Warm Sunlit Editorial",
                render: (ctx, img, text) => {
                    // Sandy/Beige minimalist wall
                    ctx.fillStyle = "#f5efe6";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Draw soft pedestal shadow
                    ctx.fillStyle = "rgba(100, 80, 60, 0.15)";
                    ctx.beginPath();
                    ctx.ellipse(500, 740, 240, 40, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // Draw minimalist product pedestal
                    ctx.fillStyle = "#e8dfd2";
                    ctx.beginPath();
                    ctx.ellipse(500, 730, 240, 35, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillRect(260, 730, 480, 50);

                    // Draw product
                    ctx.drawImage(img, 240, 200, 520, 520);

                    // Tropical/Geometric shadow casting (simulated window blinds)
                    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
                    ctx.save();
                    ctx.rotate(-0.25);
                    for(let x = -200; x < 1200; x += 150) {
                        ctx.fillRect(x, -500, 60, 2000);
                    }
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#63503d";
                        ctx.font = "italic serif 28px";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 930);
                    }
                }
            },
            {
                name: "Golden Hour Luxury",
                render: (ctx, img, text) => {
                    // Deep luxury gold gradient
                    let grad = ctx.createRadialGradient(500, 500, 100, 500, 500, 750);
                    grad.addColorStop(0, '#1c1917');
                    grad.addColorStop(1, '#0c0a09');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Golden back-glow flare
                    let goldenGlow = ctx.createRadialGradient(500, 450, 10, 500, 450, 300);
                    goldenGlow.addColorStop(0, 'rgba(234, 179, 8, 0.15)');
                    goldenGlow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = goldenGlow;
                    ctx.fillRect(0,0,1000,1000);

                    // Luxurious marble ground reflection base
                    let shadowGrad = ctx.createRadialGradient(500, 700, 50, 500, 700, 280);
                    shadowGrad.addColorStop(0, 'rgba(0, 0, 0, 0.7)');
                    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = shadowGrad;
                    ctx.fillRect(200, 660, 600, 80);

                    // Golden Border Frame Accent
                    ctx.strokeStyle = "rgba(234, 179, 8, 0.3)";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(50, 50, 900, 900);

                    ctx.drawImage(img, 230, 190, 540, 540);

                    if(text) {
                        ctx.fillStyle = "#eab308";
                        ctx.font = "bold 24px 'Georgia', serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "6px";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "Cyberpunk Neon",
                render: (ctx, img, text) => {
                    // Dark neon slate background
                    ctx.fillStyle = "#09090b";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Neon grid floor lines
                    ctx.strokeStyle = "rgba(236, 72, 153, 0.08)";
                    ctx.lineWidth = 1;
                    for (let x = 0; x < 1000; x += 50) {
                        ctx.beginPath();
                        ctx.moveTo(x, 650);
                        ctx.lineTo(x + (x - 500) * 1.5, 1000);
                        ctx.stroke();
                    }
                    for (let y = 650; y < 1000; y += 35) {
                        ctx.beginPath();
                        ctx.moveTo(0, y);
                        ctx.lineTo(1000, y);
                        ctx.stroke();
                    }

                    // Electric Cyan & Magenta glows flanking behind
                    let cyanglow = ctx.createRadialGradient(300, 400, 50, 300, 400, 400);
                    cyanglow.addColorStop(0, 'rgba(6, 182, 212, 0.18)');
                    cyanglow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = cyanglow;
                    ctx.fillRect(0, 0, 1000, 1000);

                    let magentaglow = ctx.createRadialGradient(700, 500, 50, 700, 500, 400);
                    magentaglow.addColorStop(0, 'rgba(236, 72, 153, 0.18)');
                    magentaglow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = magentaglow;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Ground reflection shadow
                    ctx.fillStyle = "rgba(6, 182, 212, 0.25)";
                    ctx.beginPath();
                    ctx.ellipse(500, 680, 200, 25, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.drawImage(img, 240, 170, 520, 520);

                    if(text) {
                        ctx.shadowColor = "#ec4899";
                        ctx.shadowBlur = 15;
                        ctx.fillStyle = "#ffffff";
                        ctx.font = "900 30px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 920);
                        ctx.shadowBlur = 0; // reset
                    }
                }
            },
            {
                name: "Nordic Minimalist Slate",
                render: (ctx, img, text) => {
                    // Soft organic slate grey
                    ctx.fillStyle = "#334155";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Soft organic dark floor gradient
                    let shadow = ctx.createRadialGradient(500, 720, 30, 500, 720, 250);
                    shadow.addColorStop(0, 'rgba(15, 23, 42, 0.6)');
                    shadow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = shadow;
                    ctx.fillRect(200, 680, 600, 80);

                    ctx.drawImage(img, 230, 190, 540, 540);

                    if(text) {
                        ctx.fillStyle = "#cbd5e1";
                        ctx.font = "300 24px system-ui, Arial, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "10px";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "Ethereal Floating Cloud",
                render: (ctx, img, text) => {
                    // Dreamy pink-lavender sky skybox
                    let grad = ctx.createLinearGradient(0, 0, 0, 1000);
                    grad.addColorStop(0, '#fae8ff');
                    grad.addColorStop(0.5, '#f5d0fe');
                    grad.addColorStop(1, '#e0f2fe');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Soft blurred cloud effect on bottom
                    let cloudGlow = ctx.createRadialGradient(500, 800, 50, 500, 800, 400);
                    cloudGlow.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                    cloudGlow.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = cloudGlow;
                    ctx.fillRect(0, 500, 1000, 500);

                    // Draw floating product with slight float offset & tilt
                    ctx.save();
                    ctx.translate(500, 440);
                    ctx.rotate(0.06); // 3.5 deg organic floating angle
                    ctx.drawImage(img, -260, -260, 520, 520);
                    ctx.restore();

                    // Subtle disconnected floating ground shadow far below
                    ctx.fillStyle = "rgba(168, 85, 247, 0.15)";
                    ctx.beginPath();
                    ctx.ellipse(500, 780, 160, 22, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    if(text) {
                        ctx.fillStyle = "#6b21a8";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "2px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "Mirror Reflection Slate",
                render: (ctx, img, text) => {
                    // Modern deep charcoal studio base
                    ctx.fillStyle = "#18181b";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Diagonal split studio floor wall line
                    ctx.strokeStyle = "rgba(255,255,255,0.05)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(0, 650);
                    ctx.lineTo(1000, 650);
                    ctx.stroke();

                    // Draw Mirror Flip Reflection
                    ctx.save();
                    ctx.scale(1, -0.4);
                    // Shift matrix to reflect precisely below product line
                    ctx.translate(0, -2950); 
                    ctx.globalAlpha = 0.25;
                    ctx.drawImage(img, 250, 650, 500, 500);
                    ctx.restore();

                    // Add a subtle gradient mask overlaying the floor to fade the reflection
                    let fadeGrad = ctx.createLinearGradient(0, 650, 0, 950);
                    fadeGrad.addColorStop(0, 'rgba(24, 24, 27, 0)');
                    fadeGrad.addColorStop(0.8, 'rgba(24, 24, 27, 0.95)');
                    ctx.fillStyle = fadeGrad;
                    ctx.fillRect(0, 650, 1000, 350);

                    // Draw Actual Foreground Product
                    ctx.drawImage(img, 250, 180, 500, 500);

                    if(text) {
                        ctx.fillStyle = "#a1a1aa";
                        ctx.font = "lighter 24px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "Stage Spotlight",
                render: (ctx, img, text) => {
                    // Deep dark background scene
                    ctx.fillStyle = "#0b0f19";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Conical spotlight rays from ceiling
                    ctx.fillStyle = "rgba(255, 255, 255, 0.03)";
                    ctx.beginPath();
                    ctx.moveTo(500, -100);
                    ctx.lineTo(250, 800);
                    ctx.lineTo(750, 800);
                    ctx.closePath();
                    ctx.fill();

                    // Heavy bottom shadow on stage
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                    ctx.beginPath();
                    ctx.ellipse(500, 720, 190, 25, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // Modern Stage pedestal platform
                    ctx.fillStyle = "#1e293b";
                    ctx.beginPath();
                    ctx.ellipse(500, 710, 190, 25, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillStyle = "#0f172a";
                    ctx.fillRect(310, 710, 380, 40);

                    ctx.drawImage(img, 260, 210, 480, 480);

                    if(text) {
                        ctx.fillStyle = "#38bdf8";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "Pop Art Poster",
                render: (ctx, img, text) => {
                    // High-vibrancy dual-tone split background
                    ctx.fillStyle = "#ff007f";
                    ctx.fillRect(0, 0, 500, 1000);
                    ctx.fillStyle = "#00e5ff";
                    ctx.fillRect(500, 0, 500, 1000);

                    // Thick graphic black drop-shadow behind product
                    ctx.fillStyle = "#1e293b";
                    ctx.save();
                    ctx.translate(22, 22);
                    ctx.drawImage(img, 240, 190, 520, 520);
                    ctx.restore();

                    // Main Product Draw on top
                    ctx.drawImage(img, 240, 190, 520, 520);

                    // Heavy block yellow background text badge
                    if(text) {
                        ctx.fillStyle = "#ffff00";
                        ctx.fillRect(200, 840, 600, 65);
                        ctx.strokeStyle = "#1e293b";
                        ctx.lineWidth = 4;
                        ctx.strokeRect(200, 840, 600, 65);

                        ctx.fillStyle = "#1e293b";
                        ctx.font = "black 28px Arial, sans-serif";
                        ctx.fontWeight = "900";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(text, 500, 872);
                    }
                }
            },
            {
                name: "Corporate Sage Minimalist",
                render: (ctx, img, text) => {
                    // Modern interior organic Green/Sage palette
                    ctx.fillStyle = "#e2e8f0";
                    ctx.fillRect(0, 0, 1000, 1000);

                    let softSage = ctx.createLinearGradient(0,0,1000,1000);
                    softSage.addColorStop(0, "#cbd5e1");
                    softSage.addColorStop(1, "#94a3b8");
                    ctx.fillStyle = softSage;
                    ctx.fillRect(80, 80, 840, 840);

                    // Frame border inlay
                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(100, 100, 800, 800);

                    // Ground drop shadow
                    ctx.fillStyle = "rgba(15, 23, 42, 0.2)";
                    ctx.beginPath();
                    ctx.ellipse(500, 710, 230, 30, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.drawImage(img, 250, 200, 500, 500);

                    if(text) {
                        ctx.fillStyle = "#ffffff";
                        ctx.font = "medium 24px system-ui, Arial";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "8px";
                        ctx.fillText(text, 500, 830);
                    }
                }
            }
        ];

        for (let i = 0; i < shoots.length; i++) {
            const shoot = shoots[i];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            
            // Execute simulated layout scene
            shoot.render(ctx, uploadedImage, titleText);
            
            ctx.restore();

            // Run pixel micro-adjusters to ensure separate files are uniquely hashed
            applyByteLevelNoise(ctx, canvas.width, canvas.height, (i + 1) * 0.17);

            // Generate physical image object assets
            await new Promise((resolve) => {
                // Generates high fidelity JPEG at high compression optimization parameters
                canvas.toBlob((blob) => {
                    const fileSizeInKB = (blob.size / 1024).toFixed(1);
                    const filename = `Product_Photoshoot_${i + 1}.jpg`;
                    
                    generatedImagesBlobs.push({ blob: blob, filename: filename });

                    const imageUrl = URL.createObjectURL(blob);
                    
                    const card = document.createElement('div');
                    card.className = 'variant-card';
                    
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    
                    const label = document.createElement('p');
                    label.innerText = shoot.name;
                    
                    const sizeLabel = document.createElement('span');
                    sizeLabel.innerText = `${fileSizeInKB} KB`;

                    card.appendChild(img);
                    card.appendChild(label);
                    card.appendChild(sizeLabel);
                    gridOutputs.appendChild(card);
                    
                    resolve();
                }, 'image/jpeg', 0.92);
            });
        }

        generateBtn.disabled = false;
        downloadAllBtn.style.display = 'block';
        statusUpdate.innerText = "Complete! Constructed 10 stunning photoshoot assets.";
    });

    downloadAllBtn.addEventListener('click', function() {
        if (generatedImagesBlobs.length === 0) return;

        const zip = new JSZip();
        generatedImagesBlobs.forEach(item => {
            zip.file(item.filename, item.blob);
        });

        zip.generateAsync({type:"blob"}).then(function(content) {
            const zipUrl = URL.createObjectURL(content);
            const downloadLink = document.createElement('a');
            downloadLink.href = zipUrl;
            downloadLink.download = "product_photoshoots_pack.zip";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        });
    });
</script>
</body>
</html>
