<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Multi-Pose Product Photoshoot Engine</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --primary-hover: #1e293b;
            --accent-color: #3b82f6;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 2.2rem;
            letter-spacing: -0.05em;
        }

        header p {
            color: #64748b;
            margin: 0;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .control-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.05);
            height: fit-content;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-download-all {
            background-color: #10b981;
        }
        .btn-download-all:hover {
            background-color: #059669;
        }

        .preview-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }

        .preview-panel h3 {
            margin-top: 0;
            font-size: 1.3rem;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .grid-outputs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .variant-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
            text-align: center;
            padding: 12px;
            box-shadow: 0 2px 5px rgb(0 0 0 / 0.02);
            transition: transform 0.2s ease;
        }

        .variant-card:hover {
            transform: translateY(-2px);
        }

        .variant-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 6px;
            border: 1px solid #f1f5f9;
        }

        .variant-card p {
            margin: 10px 0 4px 0;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
        }

        .variant-card span {
            font-size: 12px;
            color: #10b981;
            display: block;
            font-weight: 600;
        }

        #canvasStorage {
            display: none;
        }

        .status-message {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Product Photoshoot Engine</h1>
        <p>Generates 10 distinct, uniquely-posed studio scenes at 1000x1000px</p>
    </header>

    <div class="main-layout">
        <div class="control-panel">
            <div class="form-group">
                <label for="imageLoader">1. Upload Master Product Image</label>
                <input type="file" id="imageLoader" accept="image/*">
            </div>

            <div class="form-group">
                <label for="productTitle">2. Overlay Descriptor Text</label>
                <input type="text" id="productTitle" placeholder="e.g., COUTURE SNEAKERS" value="PREMIUM QUALITY">
            </div>

            <button id="generateBtn" class="btn" disabled>Generate 10 Photoshoots</button>
            <button id="downloadAllBtn" class="btn btn-download-all" style="display: none;">Download All Images (ZIP)</button>
            <div id="statusUpdate" class="status-message"></div>
        </div>

        <div class="preview-panel">
            <h3>Rendered Studio Photoshoots</h3>
            <div id="gridOutputs" class="grid-outputs">
                <p style="color: #94a3b8; grid-column: 1/-1; text-align: center; padding: 60px 0;">
                    Please upload an image file to trigger the render engine pipelines.
                </p>
            </div>
        </div>
    </div>
</div>

<canvas id="canvasStorage" width="1000" height="1000"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const generateBtn = document.getElementById('generateBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const productTitleInput = document.getElementById('productTitle');
    const gridOutputs = document.getElementById('gridOutputs');
    const canvas = document.getElementById('canvasStorage');
    const statusUpdate = document.getElementById('statusUpdate');
    const ctx = canvas.getContext('2d');

    let uploadedImage = null;
    let generatedImagesBlobs = []; 

    imageLoader.addEventListener('change', function(e) {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            uploadedImage = new Image();
            uploadedImage.onload = function() {
                generateBtn.disabled = false;
                statusUpdate.innerText = "Master image loaded. Ready to simulate environments and poses.";
            }
            uploadedImage.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    // Byte-level micro-pixel deviations to ensure unique metadata and hashes for catalog listings
    function applyByteLevelNoise(context, width, height, structuralSeed) {
        const imgData = context.getImageData(0, 0, width, height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const noise = (Math.sin(i * structuralSeed) * 1.5); 
            data[i]     = Math.min(255, Math.max(0, data[i] + noise));     // R
            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise)); // G
            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise)); // B
        }
        context.putImageData(imgData, 0, 0);
    }

    generateBtn.addEventListener('click', async function() {
        if (!uploadedImage) return;

        generateBtn.disabled = true;
        statusUpdate.innerText = "Simulating photoshoot environments and custom poses...";
        gridOutputs.innerHTML = '';
        generatedImagesBlobs = [];
        
        const titleText = productTitleInput.value.trim().toUpperCase();

        // High-end photoshoots utilizing custom offsets, scales, rotations, and reflection states for 10 unique poses
        const shoots = [
            {
                name: "1. Classic Studio Centered",
                render: (ctx, img, text) => {
                    // Back wall radial gradient
                    let grad = ctx.createRadialGradient(500, 500, 50, 500, 500, 700);
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(1, '#e2e8f0');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Drop Shadow underneath
                    ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
                    ctx.beginPath();
                    ctx.ellipse(500, 750, 220, 25, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Straight, grounded center hero pose
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.drawImage(img, -280, -280, 560, 560);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "6px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "2. Elegant Tilted Pedestal",
                render: (ctx, img, text) => {
                    // Warm clay studio gradient
                    ctx.fillStyle = "#f3eee7";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Pedestal platform
                    ctx.fillStyle = "rgba(100, 80, 60, 0.15)";
                    ctx.beginPath();
                    ctx.ellipse(500, 740, 250, 40, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.fillStyle = "#e0d5c8";
                    ctx.beginPath();
                    ctx.ellipse(500, 730, 250, 35, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillRect(250, 730, 500, 50);

                    // POSE: Grounded on pedestal with dynamic slight right tilt
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.rotate(0.08); // Slight rotation
                    ctx.drawImage(img, -250, -250, 500, 500);
                    ctx.restore();

                    // Shadow Casting (simulating Venetian window blind overlay)
                    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
                    ctx.save();
                    ctx.rotate(-0.3);
                    for(let x = -200; x < 1200; x += 160) {
                        ctx.fillRect(x, -500, 55, 2000);
                    }
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#63503d";
                        ctx.font = "italic serif 28px";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 930);
                    }
                }
            },
            {
                name: "3. Low Angle Left Lean",
                render: (ctx, img, text) => {
                    // Dark luxury obsidian space
                    let grad = ctx.createRadialGradient(500, 500, 100, 500, 500, 750);
                    grad.addColorStop(0, '#1a1816');
                    grad.addColorStop(1, '#090807');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Floor reflection glow
                    let shadowGrad = ctx.createRadialGradient(420, 730, 20, 420, 730, 240);
                    shadowGrad.addColorStop(0, 'rgba(0, 0, 0, 0.8)');
                    shadowGrad.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = shadowGrad;
                    ctx.fillRect(150, 680, 540, 80);

                    // POSE: Lower position, leaning aggressively to the left
                    ctx.save();
                    ctx.translate(420, 500);
                    ctx.rotate(-0.15); // Steep counter-clockwise tilt
                    ctx.drawImage(img, -240, -240, 480, 480);
                    ctx.restore();

                    // Modern thin gold lines
                    ctx.strokeStyle = "rgba(234, 179, 8, 0.25)";
                    ctx.lineWidth = 1.5;
                    ctx.strokeRect(60, 60, 880, 880);

                    if(text) {
                        ctx.fillStyle = "#eab308";
                        ctx.font = "bold 22px 'Georgia', serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "8px";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "4. Futuristic High Float",
                render: (ctx, img, text) => {
                    // Dark neon slate background
                    ctx.fillStyle = "#0a0a0c";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Neon floor grid patterns
                    ctx.strokeStyle = "rgba(6, 182, 212, 0.12)";
                    ctx.lineWidth = 1;
                    for (let x = 0; x < 1000; x += 60) {
                        ctx.beginPath();
                        ctx.moveTo(x, 700);
                        ctx.lineTo(x + (x - 500) * 1.6, 1000);
                        ctx.stroke();
                    }

                    // Cyberpunk lighting glow backing
                    let cyanglow = ctx.createRadialGradient(500, 400, 10, 500, 400, 350);
                    cyanglow.addColorStop(0, 'rgba(6, 182, 212, 0.15)');
                    cyanglow.addColorStop(1, 'rgba(0,0,0,0)');
                    ctx.fillStyle = cyanglow;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Floating drop shadow detached below
                    ctx.fillStyle = "rgba(6, 182, 212, 0.2)";
                    ctx.beginPath();
                    ctx.ellipse(500, 810, 150, 15, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Floated high, scaled down, leaning forward slightly
                    ctx.save();
                    ctx.translate(500, 410);
                    ctx.rotate(0.05);
                    ctx.drawImage(img, -210, -210, 420, 420);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#22d3ee";
                        ctx.font = "900 28px sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "2px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "5. Minimalist Flat-Lay Macro",
                render: (ctx, img, text) => {
                    // Nordic stone background
                    ctx.fillStyle = "#475569";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // POSE: Dynamic flat-lay zoom pose, highly rotated, offset to upper right
                    ctx.save();
                    ctx.translate(560, 420);
                    ctx.rotate(0.4); // Intense flat-lay diagonal rot
                    ctx.fillStyle = "rgba(15, 23, 42, 0.25)"; // Close flat shadow
                    ctx.fillRect(-285, -265, 590, 590); 
                    ctx.drawImage(img, -290, -290, 580, 580);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#cbd5e1";
                        ctx.font = "300 24px system-ui, Arial, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "10px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "6. Dreamy Sky Float",
                render: (ctx, img, text) => {
                    // Soft lavender to sky blue gradient skybox
                    let grad = ctx.createLinearGradient(0, 0, 0, 1000);
                    grad.addColorStop(0, '#fdf4ff');
                    grad.addColorStop(0.5, '#f3e8ff');
                    grad.addColorStop(1, '#e0f2fe');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, 1000, 1000);

                    // POSE: Floating, steep left tilt, pushed slightly to the left channel
                    ctx.save();
                    ctx.translate(460, 420);
                    ctx.rotate(-0.15); // Tilted float
                    ctx.drawImage(img, -230, -230, 460, 460);
                    ctx.restore();

                    // Ground shadow far below
                    ctx.fillStyle = "rgba(168, 85, 247, 0.12)";
                    ctx.beginPath();
                    ctx.ellipse(460, 780, 150, 18, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    if(text) {
                        ctx.fillStyle = "#7e22ce";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "4px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "7. Mirror Reflection Split",
                render: (ctx, img, text) => {
                    // Dark modern space
                    ctx.fillStyle = "#111111";
                    ctx.fillRect(0, 0, 1000, 1000);

                    ctx.strokeStyle = "rgba(255,255,255,0.08)";
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(0, 600);
                    ctx.lineTo(1000, 600);
                    ctx.stroke();

                    // POSE: Flipped reflecting stance mirror base
                    ctx.save();
                    ctx.scale(1, -0.45);
                    ctx.translate(0, -2430); 
                    ctx.globalAlpha = 0.2;
                    ctx.drawImage(img, 280, 580, 440, 440);
                    ctx.restore();

                    // Reflection mask
                    let fadeGrad = ctx.createLinearGradient(0, 600, 0, 950);
                    fadeGrad.addColorStop(0, 'rgba(17, 17, 17, 0)');
                    fadeGrad.addColorStop(1, 'rgba(17, 17, 17, 0.95)');
                    ctx.fillStyle = fadeGrad;
                    ctx.fillRect(0, 600, 1000, 400);

                    // POSE: Center foreground floating high pose
                    ctx.drawImage(img, 280, 160, 440, 440);

                    if(text) {
                        ctx.fillStyle = "#888888";
                        ctx.font = "lighter 24px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "8. Dramatic Spotlight Edge",
                render: (ctx, img, text) => {
                    ctx.fillStyle = "#080c14";
                    ctx.fillRect(0, 0, 1000, 1000);

                    // Spotlight path projection
                    ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
                    ctx.beginPath();
                    ctx.moveTo(700, -100);
                    ctx.lineTo(450, 900);
                    ctx.lineTo(950, 900);
                    ctx.closePath();
                    ctx.fill();

                    // Ground shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
                    ctx.beginPath();
                    ctx.ellipse(700, 750, 180, 20, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Off-centered right-aligned pose on dramatic stage edge
                    ctx.save();
                    ctx.translate(700, 520);
                    ctx.rotate(0.08); // Soft stylish tilt
                    ctx.drawImage(img, -230, -230, 460, 460);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#38bdf8";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "9. Abstract Pop Offset",
                render: (ctx, img, text) => {
                    // High-vibrancy pop split panels
                    ctx.fillStyle = "#ff007f";
                    ctx.fillRect(0, 0, 500, 1000);
                    ctx.fillStyle = "#00e5ff";
                    ctx.fillRect(500, 0, 500, 1000);

                    // POSE: Abstract drop shadow offset and deep tilt
                    ctx.fillStyle = "#111111";
                    ctx.save();
                    ctx.translate(475, 475);
                    ctx.rotate(-0.25);
                    ctx.drawImage(img, -230, -230, 500, 500); // Shadow representation
                    ctx.restore();

                    // POSE: Foreground overlapping pop tilt
                    ctx.save();
                    ctx.translate(450, 450);
                    ctx.rotate(-0.25); // Heavy dynamic tilt
                    ctx.drawImage(img, -230, -230, 500, 500);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#ffff00";
                        ctx.fillRect(200, 840, 600, 65);
                        ctx.strokeStyle = "#111111";
                        ctx.lineWidth = 4;
                        ctx.strokeRect(200, 840, 600, 65);

                        ctx.fillStyle = "#111111";
                        ctx.font = "black 28px Arial, sans-serif";
                        ctx.fontWeight = "900";
                        ctx.textAlign = "center";
                        ctx.textBaseline = "middle";
                        ctx.fillText(text, 500, 872);
                    }
                }
            },
            {
                name: "10. Luxury Gallery Inlay",
                render: (ctx, img, text) => {
                    // Modern sage/olive palette frame
                    ctx.fillStyle = "#e2e8f0";
                    ctx.fillRect(0, 0, 1000, 1000);

                    let softSage = ctx.createLinearGradient(0,0,1000,1000);
                    softSage.addColorStop(0, "#cbd5e1");
                    softSage.addColorStop(1, "#94a3b8");
                    ctx.fillStyle = softSage;
                    ctx.fillRect(80, 80, 840, 840);

                    ctx.strokeStyle = "#ffffff";
                    ctx.lineWidth = 4;
                    ctx.strokeRect(110, 110, 780, 780);

                    // Lower base ground shadow
                    ctx.fillStyle = "rgba(15, 23, 42, 0.2)";
                    ctx.beginPath();
                    ctx.ellipse(500, 750, 240, 25, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Pushed down and scaled up to showcase detail (Macro Focus Pose)
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.drawImage(img, -270, -270, 540, 540);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#ffffff";
                        ctx.font = "medium 24px system-ui, Arial";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "8px";
                        ctx.fillText(text, 500, 830);
                    }
                }
            }
        ];

        for (let i = 0; i < shoots.length; i++) {
            const shoot = shoots[i];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            
            // Execute environment render & pose matrix calculations
            shoot.render(ctx, uploadedImage, titleText);
            
            ctx.restore();

            // Run pixel micro-adjusters for unique digital footprints
            applyByteLevelNoise(ctx, canvas.width, canvas.height, (i + 1) * 0.17);

            // Export physical image asset
            await new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    const fileSizeInKB = (blob.size / 1024).toFixed(1);
                    const filename = `Product_Photoshoot_${i + 1}.jpg`;
                    
                    generatedImagesBlobs.push({ blob: blob, filename: filename });

                    const imageUrl = URL.createObjectURL(blob);
                    
                    const card = document.createElement('div');
                    card.className = 'variant-card';
                    
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    
                    const label = document.createElement('p');
                    label.innerText = shoot.name;
                    
                    const sizeLabel = document.createElement('span');
                    sizeLabel.innerText = `${fileSizeInKB} KB`;

                    card.appendChild(img);
                    card.appendChild(label);
                    card.appendChild(sizeLabel);
                    gridOutputs.appendChild(card);
                    
                    resolve();
                }, 'image/jpeg', 0.92);
            });
        }

        generateBtn.disabled = false;
        downloadAllBtn.style.display = 'block';
        statusUpdate.innerText = "Complete! Constructed 10 stunningly posed photoshoot assets.";
    });

    downloadAllBtn.addEventListener('click', function() {
        if (generatedImagesBlobs.length === 0) return;

        const zip = new JSZip();
        generatedImagesBlobs.forEach(item => {
            zip.file(item.filename, item.blob);
        });

        zip.generateAsync({type:"blob"}).then(function(content) {
            const zipUrl = URL.createObjectURL(content);
            const downloadLink = document.createElement('a');
            downloadLink.href = zipUrl;
            downloadLink.download = "product_photoshoots_pack.zip";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        });
    });
</script>
</body>
</html>
