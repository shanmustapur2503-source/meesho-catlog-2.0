<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Multi-Pose Product Photoshoot Engine</title>
    <style>
        :root {
            --primary-color: #0f172a;
            --primary-hover: #1e293b;
            --accent-color: #3b82f6;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 20px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 8px;
            font-size: 2.2rem;
            letter-spacing: -0.05em;
        }

        header p {
            color: #64748b;
            margin: 0;
            font-size: 1.1rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 24px;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .control-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.05);
            height: fit-content;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e293b;
        }

        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: #fff;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 14px 20px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            font-size: 16px;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-download-all {
            background-color: #10b981;
        }
        .btn-download-all:hover {
            background-color: #059669;
        }

        .preview-panel {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }

        .preview-panel h3 {
            margin-top: 0;
            font-size: 1.3rem;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 12px;
        }

        .grid-outputs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .variant-card {
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
            text-align: center;
            padding: 12px;
            box-shadow: 0 2px 5px rgb(0 0 0 / 0.02);
            transition: transform 0.2s ease;
        }

        .variant-card:hover {
            transform: translateY(-2px);
        }

        .variant-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: #ffffff;
            border-radius: 6px;
            border: 1px solid #f1f5f9;
        }

        .variant-card p {
            margin: 10px 0 4px 0;
            font-size: 13px;
            font-weight: 700;
            color: #1e293b;
        }

        .variant-card span {
            font-size: 12px;
            color: #10b981;
            display: block;
            font-weight: 600;
        }

        #canvasStorage {
            display: none;
        }

        .status-message {
            margin-top: 15px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Product Photoshoot Engine</h1>
        <p>Generates 20 distinct, uniquely-posed studio scenes with clean white backgrounds and custom lining structures at 1000x1000px</p>
    </header>

    <div class="main-layout">
        <div class="control-panel">
            <div class="form-group">
                <label for="imageLoader">1. Upload Master Product Image</label>
                <input type="file" id="imageLoader" accept="image/*">
            </div>

            <div class="form-group">
                <label for="productTitle">2. Overlay Descriptor Text</label>
                <input type="text" id="productTitle" placeholder="e.g., COUTURE SNEAKERS" value="PREMIUM QUALITY">
            </div>

            <button id="generateBtn" class="btn" disabled>Generate 20 Photoshoots</button>
            <button id="downloadAllBtn" class="btn btn-download-all" style="display: none;">Download All Images (ZIP)</button>
            <div id="statusUpdate" class="status-message"></div>
        </div>

        <div class="preview-panel">
            <h3>Rendered Studio Photoshoots</h3>
            <div id="gridOutputs" class="grid-outputs">
                <p style="color: #94a3b8; grid-column: 1/-1; text-align: center; padding: 60px 0;">
                    Please upload an image file to trigger the render engine pipelines.
                </p>
            </div>
        </div>
    </div>
</div>

<canvas id="canvasStorage" width="1000" height="1000"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const generateBtn = document.getElementById('generateBtn');
    const downloadAllBtn = document.getElementById('downloadAllBtn');
    const productTitleInput = document.getElementById('productTitle');
    const gridOutputs = document.getElementById('gridOutputs');
    const canvas = document.getElementById('canvasStorage');
    const statusUpdate = document.getElementById('statusUpdate');
    const ctx = canvas.getContext('2d');

    let uploadedImage = null;
    let generatedImagesBlobs = []; 

    imageLoader.addEventListener('change', function(e) {
        if(!e.target.files.length) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            uploadedImage = new Image();
            uploadedImage.onload = function() {
                generateBtn.disabled = false;
                statusUpdate.innerText = "Master image loaded. Ready to simulate environments and poses.";
            }
            uploadedImage.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    // Micro-pixel deviation injection
    function applyByteLevelNoise(context, width, height, structuralSeed) {
        const imgData = context.getImageData(0, 0, width, height);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            const noise = (Math.sin(i * structuralSeed) * 1.2); 
            data[i]     = Math.min(255, Math.max(0, data[i] + noise));     // R
            data[i + 1] = Math.min(255, Math.max(0, data[i + 1] + noise)); // G
            data[i + 2] = Math.min(255, Math.max(0, data[i + 2] + noise)); // B
        }
        context.putImageData(imgData, 0, 0);
    }

    // Initialize 100% white base background
    function drawWhiteBase(ctx) {
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, 1000, 1000);
    }

    // Main photoshoot definitions generator (20 highly unique poses & broad background lining architectures)
    generateBtn.addEventListener('click', async function() {
        if (!uploadedImage) return;

        generateBtn.disabled = true;
        statusUpdate.innerText = "Simulating photoshoot environments and custom poses...";
        gridOutputs.innerHTML = '';
        generatedImagesBlobs = [];
        
        const titleText = productTitleInput.value.trim().toUpperCase();

        const shoots = [
            {
                name: "1. Classical Studio Center",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Bold horizontal centering bar
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 45;
                    ctx.beginPath();
                    ctx.moveTo(0, 500);
                    ctx.lineTo(1000, 500);
                    ctx.stroke();

                    // Ground Drop Shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
                    ctx.beginPath();
                    ctx.ellipse(500, 770, 220, 25, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Straight, grounded center hero pose
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.drawImage(img, -280, -280, 560, 560);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "6px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "2. Elegant Tilted Pedestal",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Bold structural diagonal stripe
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 70;
                    ctx.beginPath();
                    ctx.moveTo(-100, -100);
                    ctx.lineTo(1100, 1100);
                    ctx.stroke();

                    // Base Pedestal
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.beginPath();
                    ctx.ellipse(500, 740, 250, 40, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    ctx.fillStyle = "#e2e8f0";
                    ctx.beginPath();
                    ctx.ellipse(500, 730, 250, 35, 0, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillRect(250, 730, 500, 50);

                    // POSE: Grounded on pedestal with dynamic slight right tilt
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.rotate(0.08); 
                    ctx.drawImage(img, -250, -250, 500, 500);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#475569";
                        ctx.font = "italic serif 28px";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 930);
                    }
                }
            },
            {
                name: "3. Low Angle Left Lean",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Intersecting broad modern grid lines
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 30;
                    ctx.strokeRect(100, 100, 800, 800);

                    // Floor reflection glow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
                    ctx.fillRect(150, 680, 540, 80);

                    // POSE: Lower position, leaning aggressively to the left
                    ctx.save();
                    ctx.translate(420, 500);
                    ctx.rotate(-0.15); 
                    ctx.drawImage(img, -240, -240, 480, 480);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#1e293b";
                        ctx.font = "bold 22px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "8px";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "4. Futuristic High Float",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Multi parallel vertical tracking lines
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 40;
                    for (let x = 200; x <= 800; x += 300) {
                        ctx.beginPath();
                        ctx.moveTo(x, 0);
                        ctx.lineTo(x, 1000);
                        ctx.stroke();
                    }

                    // Floating drop shadow detached below
                    ctx.fillStyle = "rgba(0, 0, 0, 0.07)";
                    ctx.beginPath();
                    ctx.ellipse(500, 810, 150, 15, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Floated high, scaled down, leaning forward slightly
                    ctx.save();
                    ctx.translate(500, 410);
                    ctx.rotate(0.05);
                    ctx.drawImage(img, -210, -210, 420, 420);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "900 28px sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "2px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "5. Minimalist Flat-Lay Macro",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Solid corner diagonal geometric border
                    ctx.fillStyle = "#f1f5f9";
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(400, 0);
                    ctx.lineTo(0, 400);
                    ctx.closePath();
                    ctx.fill();

                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 35;
                    ctx.beginPath();
                    ctx.moveTo(1000, 0);
                    ctx.lineTo(0, 1000);
                    ctx.stroke();

                    // POSE: Dynamic flat-lay zoom pose, highly rotated, offset to upper right
                    ctx.save();
                    ctx.translate(560, 420);
                    ctx.rotate(0.4); 
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; 
                    ctx.fillRect(-285, -265, 590, 590); 
                    ctx.drawImage(img, -290, -290, 580, 580);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#334155";
                        ctx.font = "300 24px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "10px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "6. Concentric Circles",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Concentric aesthetic outline rings
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 30;
                    ctx.beginPath();
                    ctx.arc(500, 500, 350, 0, 2 * Math.PI);
                    ctx.stroke();

                    ctx.lineWidth = 15;
                    ctx.beginPath();
                    ctx.arc(500, 500, 200, 0, 2 * Math.PI);
                    ctx.stroke();

                    // Floor shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.beginPath();
                    ctx.ellipse(460, 780, 150, 18, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Floating, steep left tilt, pushed slightly left
                    ctx.save();
                    ctx.translate(460, 420);
                    ctx.rotate(-0.15); 
                    ctx.drawImage(img, -230, -230, 460, 460);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#475569";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "4px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "7. Sunburst Ray",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Bold modern architectural sunburst rays
                    ctx.strokeStyle = "#f1f5f9";
                    ctx.lineWidth = 40;
                    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 6) {
                        ctx.beginPath();
                        ctx.moveTo(500, 500);
                        ctx.lineTo(500 + Math.cos(angle) * 800, 500 + Math.sin(angle) * 800);
                        ctx.stroke();
                    }

                    // Floor platform
                    ctx.fillStyle = "#e2e8f0";
                    ctx.fillRect(100, 650, 800, 15);

                    // POSE: High ground stance, clean scale
                    ctx.save();
                    ctx.translate(500, 450);
                    ctx.drawImage(img, -240, -240, 480, 480);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "lighter 24px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "8. Bold Split Stripe",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Solid bold off-center structural bar
                    ctx.fillStyle = "#f1f5f9";
                    ctx.fillRect(600, 0, 300, 1000);

                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 50;
                    ctx.beginPath();
                    ctx.moveTo(600, 0);
                    ctx.lineTo(600, 1000);
                    ctx.stroke();

                    // Floor Shadow
                    ctx.fillStyle = "rgba(0,0,0,0.06)";
                    ctx.beginPath();
                    ctx.ellipse(700, 750, 180, 20, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Off-centered right-aligned pose
                    ctx.save();
                    ctx.translate(700, 520);
                    ctx.rotate(0.08); 
                    ctx.drawImage(img, -230, -230, 460, 460);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "bold 26px system-ui, sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "9. Chevron Modern",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Bold architectural Chevron lining
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 55;
                    ctx.lineJoin = "miter";
                    
                    ctx.beginPath();
                    ctx.moveTo(-100, 300);
                    ctx.lineTo(500, 600);
                    ctx.lineTo(1100, 300);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(-100, 500);
                    ctx.lineTo(500, 800);
                    ctx.lineTo(1100, 500);
                    ctx.stroke();

                    // Shadow representation
                    ctx.fillStyle = "rgba(0,0,0,0.08)";
                    ctx.save();
                    ctx.translate(450, 450);
                    ctx.rotate(-0.25);
                    ctx.fillRect(-220, -220, 440, 440);
                    ctx.restore();

                    // POSE: Foreground dynamic pop tilt
                    ctx.save();
                    ctx.translate(450, 450);
                    ctx.rotate(-0.25); 
                    ctx.drawImage(img, -230, -230, 460, 460);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#1e293b";
                        ctx.font = "900 28px Arial, sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "10. Triple Accent Stripes",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Parallel bold diagonal bands
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 45;
                    for (let offset = -200; offset <= 400; offset += 300) {
                        ctx.beginPath();
                        ctx.moveTo(-100 + offset, -100);
                        ctx.lineTo(900 + offset, 900);
                        ctx.stroke();
                    }

                    // Lower base ground shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.beginPath();
                    ctx.ellipse(500, 750, 240, 25, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Detailed macro-focus pose
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.drawImage(img, -270, -270, 540, 540);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#334155";
                        ctx.font = "medium 24px system-ui, Arial";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "8px";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "11. Isometric Cube Outlines",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: 3D Isometric structural lines
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 25;
                    
                    // Cube Draw
                    ctx.beginPath();
                    ctx.moveTo(500, 200);
                    ctx.lineTo(850, 400);
                    ctx.lineTo(850, 800);
                    ctx.lineTo(500, 600);
                    ctx.closePath();
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(500, 200);
                    ctx.lineTo(150, 400);
                    ctx.lineTo(150, 800);
                    ctx.lineTo(500, 600);
                    ctx.closePath();
                    ctx.stroke();

                    // Product Shadow
                    ctx.fillStyle = "rgba(0,0,0,0.06)";
                    ctx.beginPath();
                    ctx.ellipse(500, 720, 190, 20, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Elevated center float, slight tilt
                    ctx.save();
                    ctx.translate(500, 460);
                    ctx.rotate(0.12);
                    ctx.drawImage(img, -240, -240, 480, 480);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#1e293b";
                        ctx.font = "bold 24px system-ui";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "5px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "12. Offset Intersecting Cross",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Clean thick offset cross lines
                    ctx.strokeStyle = "#f1f5f9";
                    ctx.lineWidth = 120;
                    
                    // Vertical bar
                    ctx.beginPath();
                    ctx.moveTo(300, 0);
                    ctx.lineTo(300, 1000);
                    ctx.stroke();

                    // Horizontal bar
                    ctx.beginPath();
                    ctx.moveTo(0, 400);
                    ctx.lineTo(1000, 400);
                    ctx.stroke();

                    // Structural border outline line
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 20;
                    ctx.strokeRect(50, 50, 900, 900);

                    // Floor Shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.beginPath();
                    ctx.ellipse(520, 750, 220, 22, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Centered, straight stance leaning forward slightly
                    ctx.save();
                    ctx.translate(500, 470);
                    ctx.drawImage(img, -260, -260, 520, 520);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "bold 25px Arial";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "7px";
                        ctx.fillText(text, 500, 915);
                    }
                }
            },
            {
                name: "13. Triangle Prism Frame",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Broad structural triangle lines
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 35;
                    ctx.beginPath();
                    ctx.moveTo(500, 150);
                    ctx.lineTo(900, 800);
                    ctx.lineTo(100, 800);
                    ctx.closePath();
                    ctx.stroke();

                    // Shadow
                    ctx.fillStyle = "rgba(0,0,0,0.06)";
                    ctx.beginPath();
                    ctx.ellipse(500, 780, 250, 30, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Lower center focus, scaled up
                    ctx.save();
                    ctx.translate(500, 520);
                    ctx.rotate(-0.04);
                    ctx.drawImage(img, -270, -270, 540, 540);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#475569";
                        ctx.font = "italic 26px serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 930);
                    }
                }
            },
            {
                name: "14. Concentric Structural Squares",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Nested broad clean square boundaries
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 40;
                    ctx.strokeRect(150, 150, 700, 700);

                    ctx.strokeStyle = "#f1f5f9";
                    ctx.lineWidth = 20;
                    ctx.strokeRect(300, 300, 400, 400);

                    // Floating drop shadow
                    ctx.fillStyle = "rgba(0,0,0,0.05)";
                    ctx.beginPath();
                    ctx.ellipse(540, 820, 160, 15, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: High drift, slight clockwise rotation
                    ctx.save();
                    ctx.translate(540, 440);
                    ctx.rotate(0.18);
                    ctx.drawImage(img, -220, -220, 440, 440);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#1e293b";
                        ctx.font = "900 24px sans-serif";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "6px";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "15. Wavy Ripple Lines",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Dynamic flowing wavy broad lines
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 28;
                    
                    for (let y = 200; y <= 800; y += 200) {
                        ctx.beginPath();
                        for (let x = -50; x <= 1050; x += 50) {
                            const waveY = y + Math.sin(x * 0.005) * 60;
                            if (x === -50) ctx.moveTo(x, waveY);
                            else ctx.lineTo(x, waveY);
                        }
                        ctx.stroke();
                    }

                    // Shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.beginPath();
                    ctx.ellipse(480, 760, 240, 24, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Flat-lay macro stance, highly rotated left
                    ctx.save();
                    ctx.translate(480, 460);
                    ctx.rotate(-0.35);
                    ctx.drawImage(img, -260, -260, 520, 520);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#334155";
                        ctx.font = "bold 23px system-ui";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "12px";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "16. Diamond Lattice",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Elegant geometric diamond framing
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 35;
                    
                    ctx.beginPath();
                    ctx.moveTo(500, 100);
                    ctx.lineTo(900, 500);
                    ctx.lineTo(500, 900);
                    ctx.lineTo(100, 500);
                    ctx.closePath();
                    ctx.stroke();

                    // Floor base shadow
                    ctx.fillStyle = "rgba(0,0,0,0.06)";
                    ctx.beginPath();
                    ctx.ellipse(500, 790, 200, 20, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Perfect center alignment, slightly elevated
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.drawImage(img, -250, -250, 500, 500);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "bold 28px Georgia, serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 930);
                    }
                }
            },
            {
                name: "17. Spotlight Corridor",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Dramatic converging corridor ray lines
                    ctx.strokeStyle = "#f1f5f9";
                    ctx.lineWidth = 45;
                    ctx.beginPath();
                    ctx.moveTo(100, 0);
                    ctx.lineTo(400, 1000);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(900, 0);
                    ctx.lineTo(600, 1000);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(500, 0);
                    ctx.lineTo(500, 1000);
                    ctx.stroke();

                    // Floor pedestal line
                    ctx.fillStyle = "#cbd5e1";
                    ctx.fillRect(200, 740, 600, 16);

                    // Drop Shadow
                    ctx.fillStyle = "rgba(0,0,0,0.05)";
                    ctx.beginPath();
                    ctx.ellipse(500, 730, 220, 18, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Tall hero stance
                    ctx.save();
                    ctx.translate(500, 440);
                    ctx.drawImage(img, -240, -240, 480, 480);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#475569";
                        ctx.font = "lighter 25px monospace";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "18. Step Ladder Pedestal",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Horizontal bold structural steps
                    ctx.strokeStyle = "#e2e8f0";
                    ctx.lineWidth = 50;
                    for (let y = 150; y <= 850; y += 200) {
                        ctx.beginPath();
                        ctx.moveTo(100, y);
                        ctx.lineTo(900, y);
                        ctx.stroke();
                    }

                    // Shadow
                    ctx.fillStyle = "rgba(0,0,0,0.06)";
                    ctx.beginPath();
                    ctx.ellipse(450, 750, 200, 22, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Shifted left and slightly up
                    ctx.save();
                    ctx.translate(450, 460);
                    ctx.rotate(-0.08);
                    ctx.drawImage(img, -230, -230, 460, 460);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "bold 24px system-ui";
                        ctx.textAlign = "center";
                        ctx.letterSpacing = "6px";
                        ctx.fillText(text, 500, 910);
                    }
                }
            },
            {
                name: "19. Abstract Maze Structure",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Geometric intersecting bold border maze
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 45;
                    ctx.lineCap = "square";
                    
                    ctx.beginPath();
                    ctx.moveTo(100, 100);
                    ctx.lineTo(900, 100);
                    ctx.lineTo(900, 600);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(100, 900);
                    ctx.lineTo(100, 400);
                    ctx.lineTo(700, 400);
                    ctx.stroke();

                    // Close base shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.beginPath();
                    ctx.ellipse(520, 760, 250, 24, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Heavy detailed closeup scale
                    ctx.save();
                    ctx.translate(520, 470);
                    ctx.rotate(0.15);
                    ctx.drawImage(img, -280, -280, 560, 560);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#1e293b";
                        ctx.font = "900 26px sans-serif";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 920);
                    }
                }
            },
            {
                name: "20. Double Inlay Border",
                render: (ctx, img, text) => {
                    drawWhiteBase(ctx);

                    // Background: Bold outer perimeter lining
                    ctx.strokeStyle = "#cbd5e1";
                    ctx.lineWidth = 45;
                    ctx.strokeRect(70, 70, 860, 860);

                    // Inner frame
                    ctx.strokeStyle = "#f1f5f9";
                    ctx.lineWidth = 20;
                    ctx.strokeRect(120, 120, 760, 760);

                    // Ground drop shadow
                    ctx.fillStyle = "rgba(0, 0, 0, 0.07)";
                    ctx.beginPath();
                    ctx.ellipse(500, 760, 210, 20, 0, 0, 2 * Math.PI);
                    ctx.fill();

                    // POSE: Solid center balanced hero stance
                    ctx.save();
                    ctx.translate(500, 480);
                    ctx.drawImage(img, -260, -260, 520, 520);
                    ctx.restore();

                    if(text) {
                        ctx.fillStyle = "#0f172a";
                        ctx.font = "medium 24px system-ui";
                        ctx.letterSpacing = "9px";
                        ctx.textAlign = "center";
                        ctx.fillText(text, 500, 910);
                    }
                }
            }
        ];

        for (let i = 0; i < shoots.length; i++) {
            const shoot = shoots[i];
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            
            // Execute background lining & pose algorithms
            shoot.render(ctx, uploadedImage, titleText);
            
            ctx.restore();

            // Unique cryptographic hashing injecter
            applyByteLevelNoise(ctx, canvas.width, canvas.height, (i + 1) * 0.17);

            // Asset pipeline exporter
            await new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    const fileSizeInKB = (blob.size / 1024).toFixed(1);
                    const filename = `Product_Photoshoot_${i + 1}.jpg`;
                    
                    generatedImagesBlobs.push({ blob: blob, filename: filename });

                    const imageUrl = URL.createObjectURL(blob);
                    
                    const card = document.createElement('div');
                    card.className = 'variant-card';
                    
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    
                    const label = document.createElement('p');
                    label.innerText = shoot.name;
                    
                    const sizeLabel = document.createElement('span');
                    sizeLabel.innerText = `${fileSizeInKB} KB`;

                    card.appendChild(img);
                    card.appendChild(label);
                    card.appendChild(sizeLabel);
                    gridOutputs.appendChild(card);
                    
                    resolve();
                }, 'image/jpeg', 0.92);
            });
        }

        generateBtn.disabled = false;
        downloadAllBtn.style.display = 'block';
        statusUpdate.innerText = "Complete! Constructed 20 stunningly posed photoshoot assets with unique lining structural white backgrounds.";
    });

    downloadAllBtn.addEventListener('click', function() {
        if (generatedImagesBlobs.length === 0) return;

        const zip = new JSZip();
        generatedImagesBlobs.forEach(item => {
            zip.file(item.filename, item.blob);
        });

        zip.generateAsync({type:"blob"}).then(function(content) {
            const zipUrl = URL.createObjectURL(content);
            const downloadLink = document.createElement('a');
            downloadLink.href = zipUrl;
            downloadLink.download = "product_photoshoots_pack.zip";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        });
    });
</script>
</body>
</html>
